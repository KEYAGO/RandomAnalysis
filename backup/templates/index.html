<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Generator</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Function Generator</h1>
            <p>Symbolic derivatives and graphs for educational purposes</p>
        </header>

        <main>
            <div class="control-panel">
                <button id="generate-btn">Generate Function</button>
                <button id="advanced-btn" class="secondary-btn">Advanced View: OFF</button>
            </div>

            <div id="workspace" class="normal-layout">
                
                <div class="visual-area">
                    <div class="formula-display">
                        <div class="formula-card">
                            <h3>Function</h3>
                            <div id="fx-text" class="formula-render">$$f(x) = ...$$</div>
                        </div>
                        <div class="formula-card">
                            <h3>First Derivative</h3>
                            <div id="dfx-text" class="formula-render">$$f'(x) = ...$$</div>
                        </div>
                        <div class="formula-card">
                            <h3>Second Derivative</h3>
                            <div id="ddfx-text" class="formula-render">$$f''(x) = ...$$</div>
                        </div>
                    </div>

                    <div id="charts-wrapper" class="charts-grid">
                        <div class="chart-card">
                            <div id="chart-fx" class="chart"></div>
                        </div>
                        <div class="chart-card">
                            <div id="chart-dfx" class="chart"></div>
                        </div>
                        <div class="chart-card">
                            <div id="chart-ddfx" class="chart"></div>
                        </div>
                    </div>
                </div>

                <div id="analysis-panel" class="analysis-card hidden">
                    <h3>Mathematical Analysis Report</h3>
                    <div id="analysis-content" class="analysis-body">
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
